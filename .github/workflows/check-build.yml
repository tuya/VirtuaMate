name: VirtuaMate CI
run-name: ${{ github.actor }} triggered CI check
on:
  push:
  pull_request:
jobs:
  Check-Source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          show-progress: false
          submodules: true

      - run: echo "🎉 Triggered by ${{ github.event_name }} on ${{ github.ref }}"

      - name: Verify project structure
        run: |
          echo "::group::Project structure check"
          test -f CMakeLists.txt        && echo "✓ CMakeLists.txt"
          test -f Kconfig               && echo "✓ Kconfig"
          test -d TuyaOpen              && echo "✓ TuyaOpen submodule"
          test -d src/vrm               && echo "✓ src/vrm"
          test -d config                && echo "✓ config"
          test -f config/RaspberryPi.config && echo "✓ RaspberryPi.config"
          echo "::endgroup::"

      - name: Verify TuyaOpen SDK
        run: |
          echo "::group::TuyaOpen SDK check"
          cd TuyaOpen
          test -f tos.py      && echo "✓ tos.py"
          test -f export.sh   && echo "✓ export.sh"
          echo "SDK commit: $(git rev-parse --short HEAD)"
          echo "::endgroup::"

      - name: Check source files compile-ready
        run: |
          echo "::group::Source file check"
          echo "C source files:"
          find src/ agent/ IM/ tools/ memory/ gateway/ -name '*.c' 2>/dev/null | wc -l
          echo "C header files:"
          find src/ agent/ IM/ tools/ memory/ gateway/ include/ -name '*.h' 2>/dev/null | wc -l
          echo ""
          echo "NOTE: Actual build requires Raspberry Pi (ARM) native compilation."
          echo "      Cross-compilation is not currently supported in CI."
          echo "::endgroup::"
